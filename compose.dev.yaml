# compose.dev.yaml
# ========================================
# YaakoDrive 開発用Compose定義
# ========================================
#
# ホストにRust/Node.js/PostgreSQLを入れず、Docker内で開発するための構成。
#
# 起動:
#   docker compose -f compose.yaml -f compose.dev.yaml up
#
# バックエンドcheck:
#   docker compose -f compose.yaml -f compose.dev.yaml exec backend cargo check
#
# migration:
#   docker compose -f compose.yaml -f compose.dev.yaml exec backend sqlx migrate run
#
# 方針:
# - backendはRust開発コンテナ。ソースをbind mountする
# - frontendはReact開発コンテナ。後で本格実装するため、現段階では最小構成
# - dbはcompose.yamlのPostgreSQLを使う

name: yaakodrive-dev

services:
  backend:
    container_name: yaakodrive_backend_dev

    build:
      context: .
      dockerfile: backend/Dockerfile
      target: dev

    working_dir: /workspace/backend
    tty: true

    command:
      - cargo
      - watch
      - -x
      - check

    environment:
      # config crateで APP__... を読み込む想定。
      APP__ENV: development
      APP__DATABASE__URL: postgres://yaakodrive:yaakodrive@db:5432/yaakodrive
      APP__SERVER__HOST: 0.0.0.0
      APP__SERVER__PORT: 8080
      APP__COOKIE__SECURE: "false"
      APP__STORAGE__DATA_DIR: /workspace/data/dev
      APP__UPLOAD__MAX_SIZE_BYTES: 10485760
      RUST_LOG: yaakodrive=debug,tower_http=debug

    volumes:
      # リポジトリ全体を見られるようにする。
      - .:/workspace

      # Rustの依存キャッシュ。毎回ダウンロードし直さないための名前付きvolume。
      - cargo_registry:/usr/local/cargo/registry
      - cargo_git:/usr/local/cargo/git

      # targetは容量が大きいため名前付きvolumeに逃がす。
      - backend_target:/workspace/backend/target

      # 開発用アップロードファイル置き場。
      - ./data/dev:/workspace/data/dev

    ports:
      - "8080:8080"

    depends_on:
      db:
        condition: service_healthy

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    container_name: yaakodrive_frontend_dev

    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: dev

    working_dir: /workspace/frontend
    tty: true

    #command:
    #  - npm
    #  - run
    # - dev
    #  - --
    #  - --host
    #  - 0.0.0.0
    command:
      - sleep
      - infinity

    environment:
      VITE_API_BASE_URL: http://localhost:8080

    volumes:
      - .:/workspace
    #      - frontend_node_modules:/workspace/frontend/node_modules

    ports:
      - "5173:5173"

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  cargo_registry:
  cargo_git:
  backend_target:
  frontend_node_modules:
