# compose.dev.yaml
# ========================================
# YaakoDrive 開発用Compose定義
# ========================================
#
# ホストにRust/Node.js/PostgreSQLを入れず、Docker内で開発するための構成。
#
# 起動:
#   docker compose -f compose.yaml -f compose.dev.yaml up
#
# バックエンドcheck:
#   docker compose -f compose.yaml -f compose.dev.yaml exec backend cargo check
#
# migration:
#   docker compose -f compose.yaml -f compose.dev.yaml exec backend sqlx migrate run
#
# 方針:
# - backendはRust開発コンテナ。ソースをbind mountする
# - frontendはReact開発コンテナ。後で本格実装するため、現段階では最小構成
# - dbはcompose.yamlのPostgreSQLを使う

name: yaakodrive-dev

services:
  db:
    # envファイルの指定
    env_file: .config/.env.dev

    environment:
      POSTGRES_DB: yaakodrive_dev # ← dev用DB名に上書き
    # POSTGRES_PASSWORDは.env.devのPOSTGRES_PASSWORDが使われる

    volumes:
      # devはバックアップ処置などを取らないため
      # バインドではなく名前付きvolume
      - postgres_data_dev:/var/lib/postgresql/data

  backend:
    container_name: yaakodrive_backend_dev

    build:
      context: .
      dockerfile: backend/Dockerfile
      target: dev

    working_dir: /workspace/backend
    tty: true

    command:
      - cargo
      - watch
      - -x
      - check

    # envファイルの指定
    env_file: .config/.env.dev

    # 環境変数の設定
    environment:
      # 実行環境ラベル(上書きconfigファイルの指定に使用)
      APP_ENV: dev
      # 設定ファイルのパス
      APP_CONFIG_DIR: /workspace/.config

    volumes:
      # リポジトリ全体を見られるようにする。
      - .:/workspace

      # 設定ファイルをvolumeにマウント(読み取り専用)
      - ./.config/config.default.toml:/workspace/.config/config.default.toml:ro
      - ./.config/config.dev.toml:/workspace/.config/config.dev.toml:ro

      # Rustの依存キャッシュ。毎回ダウンロードし直さないための名前付きvolume。
      - cargo_registry:/usr/local/cargo/registry
      - cargo_git:/usr/local/cargo/git

      # targetは容量が大きいため名前付きvolumeに逃がす。
      - backend_target:/workspace/backend/target
      # 開発用アップロードファイル置き場
      # 必要になったらコメントを外す
      #- ./data/dev:/workspace/data/dev

    ports:
      - "8080:8080"

    depends_on:
      db:
        condition: service_healthy

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    container_name: yaakodrive_frontend_dev

    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: dev

    working_dir: /workspace/frontend
    tty: true

    #environment:
    #  VITE_API_BASE_URL: http://localhost:8080

    volumes:
      - .:/workspace
      - frontend_node_modules:/workspace/frontend/node_modules

    ports:
      - "5173:5173"

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  cargo_registry:
  cargo_git:
  backend_target:
  frontend_node_modules:
  postgres_data_dev:
