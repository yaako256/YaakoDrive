# compose.yaml
# ========================================
# YaakoDrive 共通Compose定義
# ========================================
#
# このファイルは「共通の土台」として使う。
# 実際の開発では compose.dev.yaml、本番では compose.prod.yaml を重ねて使う想定。
#
# 開発:
#   docker compose -f compose.yaml -f compose.dev.yaml up
#
# 本番:
#   docker compose -f compose.yaml -f compose.prod.yaml up -d
#
# 方針:
# - PostgreSQLは公式imageを使う
# - backend/frontendは別コンテナにする
# - DBデータとアップロードファイルはvolume/bind mountで永続化する

name: yaakodrive

services:
  db:
    image: postgres:16-bookworm
    container_name: yaakodrive_db
    restart: unless-stopped

    environment:
      POSTGRES_USER: yaakodrive
      POSTGRES_PASSWORD: yaakodrive
      POSTGRES_DB: yaakodrive
      TZ: Asia/Tokyo

    # 本番ではcompose.prod.yaml側でホストパスへ差し替える。
    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yaakodrive -d yaakodrive"]
      interval: 10s
      timeout: 5s
      retries: 5

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
