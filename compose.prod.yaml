# compose.prod.yaml
# ========================================
# YaakoDrive 本番用Compose定義
# ========================================
#
# 本番はTailscale内での運用を想定する。
# ただし、将来的なインターネット公開も見据えて、設定・永続化・ログを分ける。
#
# 起動:
#   docker compose -f compose.yaml -f compose.prod.yaml up -d
#
# 注意:
# - 本番ではPOSTGRES_PASSWORDやAPP__JWT__SECRETを必ず変更する
# - /srv/yaakodrive/... は自宅サーバ側のパスに合わせて調整する

name: yaakodrive-prod

services:
  db:
    container_name: yaakodrive_db

    environment:
      POSTGRES_DB: yaakodrive_prod
      # POSTGRES_PASSWORDは.env.prodのPOSTGRES_PASSWORDが使われる

    volumes:
      # バックアップ処置などを取るためバインドVolume化
      - /srv/yaakodrive/postgres:/var/lib/postgresql/data

  backend:
    container_name: yaakodrive_backend
    restart: unless-stopped

    build:
      context: .
      dockerfile: backend/Dockerfile
      target: prod

    # envファイルの指定
    env_file: .config/.env.prod

    # 環境変数の設定
    environment:
      # 実行環境ラベル(上書きconfigファイルの指定に使用)
      APP_ENV: prod
      # 設定ファイルのパス
      APP_CONFIG_DIR: /app/.config

    volumes:
      # 設定ファイル(読み取り専用)
      - ./.config/config.default.toml:/app/.config/config.default.toml:ro
      - ./.config/config.prod.toml:/app/.config/config.prod.toml:ro

      # 実ファイル保存先。バックアップ対象。
      - /srv/yaakodrive/data:/data

    # Tailscale内だけで使う場合でも、まずは明示的に公開して動作確認する。
    # 必要なら 127.0.0.1:8080:8080 や reverse proxy 構成に変更する。
    ports:
      - "127.0.0.1:8080:8080" # 127でホスト外からは見えない

    depends_on:
      db:
        condition: service_healthy

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    container_name: yaakodrive_frontend
    restart: unless-stopped

    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: prod

    ports:
      - "3000:80"

    depends_on:
      - backend

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
